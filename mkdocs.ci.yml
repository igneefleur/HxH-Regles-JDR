# Configuration de CI : hérite de mkdocs.yml et ACTIVE en plus la génération du
# livre en PDF (plugin mkdocs-to-pdf, moteur WeasyPrint). Utilisée uniquement par
# la CI Linux (.github/workflows/deploy.yml), avec la variable ENABLE_PDF_EXPORT=1.
#
# Pourquoi un fichier séparé plutôt qu'une entrée dans mkdocs.yml :
# mkdocs-to-pdf importe WeasyPrint dès le chargement du module, et WeasyPrint a
# besoin de bibliothèques natives (Pango/GTK) absentes sous Windows. Lister le
# plugin dans mkdocs.yml ferait donc échouer « mkdocs serve » en local (erreur
# « cannot load library 'libgobject-2.0-0' »). En isolant le plugin ici, le build
# et le serveur de développement locaux restent intacts ; seule la CI charge le PDF.
INHERIT: mkdocs.yml

# La liste plugins remplace (et non complète) celle héritée : on redéclare donc
# « search » avant d'ajouter le générateur de PDF.
plugins:
  - search
  - to-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT       # ne génère le PDF que si la variable vaut "1"
      output_path: pdf/livre-de-regles.pdf    # => https://igneefleur.github.io/HxH-Regles-JDR/pdf/livre-de-regles.pdf
      cover_title: HxH Système JDR
      cover_subtitle: Livre de Règles
      author: Théo Cavaillès
      toc_title: Table des matières
      exclude_pages:
        - '^\./$'                             # exclut la page d'accueil (changelog) du PDF
