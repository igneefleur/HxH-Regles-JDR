theme:
  name: material
  custom_dir: overrides
  language: fr
  palette:
    scheme: default
    primary: custom
    accent: custom
  # false = Material n'appelle PAS Google Fonts. Les polices sont auto-hébergées
  # (docs/assets/fonts/ + stylesheets/fonts.css) ; les variables --md-text-font et
  # --md-code-font sont redéclarées dans extra.css.
  font: false
  features:
    - navigation.instant  # navigation SPA : pas de rechargement complet (pas de flash)
    - navigation.tabs        # barre horizontale en haut
    - navigation.tabs.sticky # la barre reste collée (hauteur d'en-tête constante)
    - navigation.expand      # arborescence dépliée par défaut
    - navigation.indexes
    - navigation.footer      # liens page précédente / suivante (requis pour le défilement continu)
    - content.tooltips
extra:
  generator: false   # supprime le « Made with Material for MkDocs »
extra_css:
  - stylesheets/fonts.css   # @font-face auto-hébergés : doit être chargée en premier
  - stylesheets/extra.css?v=2
  - stylesheets/atelier.css
  - stylesheets/night.css
  - stylesheets/forge.css
  - stylesheets/creation.css
extra_javascript:
  - javascripts/changelog.js
  - javascripts/continuous.js
  - javascripts/nav-drawer.js
  - javascripts/glossary.js
  - javascripts/print-book.js
  - javascripts/atelier.js
  - javascripts/night.js
  - javascripts/forge.js
  - javascripts/creation.js
  - javascripts/copybtn.js
hooks:
  - hooks/changelog.py
  - hooks/nen_atelier.py
  - hooks/forge.py
  - hooks/creation.py
plugins:
  - search
markdown_extensions:
  - abbr
  - attr_list
  - md_in_html
  - pymdownx.snippets:
      auto_append:
        - docs/includes/glossaire.md