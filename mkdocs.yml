site_name: HxH Système JDR
site_url: https://igneefleur.github.io/HxH-Regles-JDR/
exclude_docs: |
  includes/glossaire.md
not_in_nav: |
  content/regles/nen/refonte_nen.md
nav:
  - Accueil: index.md
  - Règles:
      - content/regles/index.md
      - Le Personnage:
          - Avantages: content/regles/personnage/avantages.md
          - Éclat: content/regles/personnage/eclat.md
          - Caractéristiques: content/regles/personnage/caracteristiques.md
          - Capacités physiques: content/regles/personnage/capacites-physiques.md
          - Points de formation: content/regles/personnage/points-formation.md
          - Compétences: content/regles/personnage/competences.md
          - Classes: content/regles/personnage/classe.md
          - Les Sens: content/regles/personnage/sens.md
          - États: content/regles/personnage/etats.md
      - L'Échelle du Monde:
          - Les Tailles: content/regles/monde/tailles.md
          - Types de Dégâts: content/regles/monde/degats.md
      - Le Combat:
          - Déroulement du combat: content/regles/combat/deroulement-combat.md
          - Manœuvres: content/regles/combat/manoeuvres.md
          - Arts martiaux: content/regles/combat/arts-martiaux.md
          - Formations: content/regles/combat/formations.md
          - Critique et Blessures: content/regles/combat/critique-blessures.md
          - Armes: content/regles/combat/armes.md
          - Système de points des armes: content/regles/combat/systeme-points-armes.md
      - Nen:
          - Aura: content/regles/nen/aura.md
          - Développement intérieur: content/regles/nen/di.md
          - Les 12 archétypes de Nen: content/regles/nen/archetypes-nen.md
          - Techniques du Nen: content/regles/nen/techniques-nen.md
          - Capacités de Nen: content/regles/nen/capacites-de-nen.md
          - Renforcement: content/regles/nen/renforcement.md
          - Émission: content/regles/nen/emission.md
          - Transmutation: content/regles/nen/transmutation.md
          - Manipulation: content/regles/nen/manipulation.md
          - Conjuration: content/regles/nen/conjuration.md
          - Spécialisation: content/regles/nen/specialisation.md
          - Ancienne version: content/regles/nen/ancienne-version.md
  - Univers:
      - content/univers/index.md
      - Cartes du monde: content/univers/cartes.md
      - Heavens Arena: content/univers/heavens-arena.md
theme:
  name: material
  custom_dir: overrides
  language: fr
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: EB Garamond
    code: Roboto Mono
  features:
    - navigation.instant  # navigation SPA : pas de rechargement complet (pas de flash)
    - navigation.tabs        # barre horizontale en haut
    - navigation.tabs.sticky # la barre reste collée (hauteur d'en-tête constante)
    - navigation.expand      # arborescence dépliée par défaut
    - navigation.indexes
    - navigation.footer      # liens page précédente / suivante (requis pour le défilement continu)
    - content.tooltips
extra:
  generator: false   # supprime le « Made with Material for MkDocs »
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/changelog.js
  - javascripts/continuous.js
  - javascripts/glossary.js
  - javascripts/print-book.js
hooks:
  - hooks/changelog.py
plugins:
  - search
markdown_extensions:
  - abbr
  - attr_list
  - md_in_html
  - pymdownx.snippets:
      auto_append:
        - docs/includes/glossaire.md